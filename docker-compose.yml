version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: schemalens-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: schemalens
      POSTGRES_PASSWORD: schemalens_dev
      POSTGRES_DB: schemalens
    volumes:
      - schemalens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemalens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  schemalens_pgdata:
